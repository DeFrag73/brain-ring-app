<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Брейн-ринг - Екран глядачів</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .main-container {
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .teams-section {
            margin-bottom: 3rem;
            display: none; /* Приховано за замовчуванням */
        }

        .team-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .team-name {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .team-score {
            font-size: 4rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 0.5rem;
        }

        .vs-separator {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .question-section {
            margin-top: 3rem;
            display: none; /* Приховано за замовчуванням */
        }

        .question-card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            border: 3px solid #ffd700;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            animation: fadeInUp 0.6s ease-out;
        }

        .question-number {
            font-size: 1.5rem;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .question-text {
            font-size: 2rem;
            line-height: 1.4;
            font-weight: 500;
            color: #333;
        }

        .no-game {
            text-align: center;
            margin-top: 5rem;
            opacity: 0.8;
        }

        .no-game i {
            font-size: 5rem;
            margin-bottom: 2rem;
            opacity: 0.6;
        }

        .no-game h3 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .waiting-animation {
            animation: pulse 2s infinite;
        }

        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .connection-status.connected {
            background: rgba(40, 167, 69, 0.8);
            color: white;
        }

        .connection-status.connecting {
            background: rgba(255, 193, 7, 0.8);
            color: #333;
        }

        .connection-status.disconnected {
            background: rgba(220, 53, 69, 0.8);
            color: white;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
            100% {
                opacity: 1;
            }
        }

        .score-animation {
            animation: scoreChange 0.5s ease-in-out;
        }

        @keyframes scoreChange {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
                color: #ff6b6b;
            }
            100% {
                transform: scale(1);
            }
        }

        .slide-in-left {
            animation: slideInLeft 0.5s ease-out;
        }

        .slide-in-right {
            animation: slideInRight 0.5s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .team-name {
                font-size: 1.5rem;
            }

            .team-score {
                font-size: 3rem;
            }

            .vs-separator {
                font-size: 2rem;
            }

            .question-text {
                font-size: 1.5rem;
            }

            .main-container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Індикатор стану з'єднання -->
    <div id="connection-status" class="connection-status connecting">
        <i class="fas fa-circle-notch fa-spin"></i> Підключення...
    </div>

    <div class="container-fluid main-container">
        <!-- Заголовок -->
        <div class="header">
            <h1><i class="fas fa-brain"></i> БРЕЙН-РИНГ</h1>
            <p class="lead mb-0">Інтелектуальні змагання</p>
        </div>

        <!-- Секція команд -->
        <div class="teams-section" id="teams-section">
            <div class="row">
                <!-- Перша команда -->
                <div class="col-md-5">
                    <div class="team-card" id="team1-card">
                        <div class="team-name" id="team1-name">Команда 1</div>
                        <div class="team-score" id="team1-score">0</div>
                    </div>
                </div>

                <!-- VS сепаратор -->
                <div class="col-md-2">
                    <div class="vs-separator">
                        <i class="fas fa-bolt waiting-animation"></i>
                    </div>
                </div>

                <!-- Друга команда -->
                <div class="col-md-5">
                    <div class="team-card" id="team2-card">
                        <div class="team-name" id="team2-name">Команда 2</div>
                        <div class="team-score" id="team2-score">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Секція питання -->
        <div class="question-section" id="question-section">
            <div class="question-card">
                <div class="question-number" id="question-number">
                    <i class="fas fa-question-circle"></i> Питання № 1
                </div>
                <div class="question-text" id="question-text">
                    Очікування питання...
                </div>
            </div>
        </div>

        <!-- Секція очікування -->
        <div id="waiting-section" style="margin-top: 3rem; display: none;">
            <div class="text-center">
                <div class="waiting-animation">
                    <i class="fas fa-hourglass-half fa-3x mb-3" style="opacity: 0.6;"></i>
                    <h3>Очікування питання...</h3>
                </div>
            </div>
        </div>

        <!-- Очікування початку гри -->
        <div class="no-game" id="no-game">
            <i class="fas fa-gamepad"></i>
            <h3>Очікування початку гри</h3>
            <p class="lead">Адміністратор готує команди для змагання</p>
        </div>
    </div>

    <!-- JavaScript для WebSocket з'єднання -->
    <script>
        let socket;
        let reconnectInterval;
        let isReconnecting = false;

        // Елементи DOM
        const connectionStatus = document.getElementById('connection-status');
        const teamsSection = document.getElementById('teams-section');
        const questionSection = document.getElementById('question-section');
        const waitingSection = document.getElementById('waiting-section');
        const noGameSection = document.getElementById('no-game');

        // Елементи команд
        const team1Name = document.getElementById('team1-name');
        const team1Score = document.getElementById('team1-score');
        const team2Name = document.getElementById('team2-name');
        const team2Score = document.getElementById('team2-score');
        const team1Card = document.getElementById('team1-card');
        const team2Card = document.getElementById('team2-card');

        // Елементи питання
        const questionNumber = document.getElementById('question-number');
        const questionText = document.getElementById('question-text');

        // Функція підключення до WebSocket
        function connectWebSocket() {
            try {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws`;
                socket = new WebSocket(wsUrl);

                socket.onopen = function(event) {
                    console.log('WebSocket з\'єднання встановлено');
                    updateConnectionStatus('connected');
                    isReconnecting = false;

                    if (reconnectInterval) {
                        clearInterval(reconnectInterval);
                        reconnectInterval = null;
                    }
                };

                socket.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'display_update') {
                            updateDisplay(data);
                        }
                    } catch (error) {
                        console.error('Помилка обробки повідомлення:', error);
                    }
                };

                socket.onclose = function(event) {
                    console.log('WebSocket з\'єднання закрито:', event.code, event.reason);
                    updateConnectionStatus('disconnected');

                    if (!isReconnecting) {
                        attemptReconnect();
                    }
                };

                socket.onerror = function(error) {
                    console.error('Помилка WebSocket:', error);
                    updateConnectionStatus('disconnected');
                };

            } catch (error) {
                console.error('Помилка створення WebSocket:', error);
                updateConnectionStatus('disconnected');
                attemptReconnect();
            }
        }

        // Функція спроби перепідключення
        function attemptReconnect() {
            if (isReconnecting) return;

            isReconnecting = true;
            updateConnectionStatus('connecting');

            reconnectInterval = setInterval(function() {
                console.log('Спроба перепідключення...');
                connectWebSocket();
            }, 3000);
        }

        // Оновлення статусу з'єднання
        function updateConnectionStatus(status) {
            connectionStatus.className = `connection-status ${status}`;

            switch(status) {
                case 'connected':
                    connectionStatus.innerHTML = '<i class="fas fa-wifi"></i> Підключено';
                    break;
                case 'connecting':
                    connectionStatus.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Підключення...';
                    break;
                case 'disconnected':
                    connectionStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Відключено';
                    break;
            }
        }

        // Головна функція оновлення UI
        function updateDisplay(data) {
            console.log('Оновлення display:', data);

            // Оновлення команд і рахунку
            if (data.team1 && data.team2) {
                showTeamsSection();
                updateTeams(data);
            } else {
                showNoGameSection();
            }

            // Оновлення питання
            if (data.show_question && data.current_question) {
                showQuestion(data.current_question);
            } else if (data.team1 && data.team2) {
                showWaitingForQuestion();
            }
        }

        // Показати секцію команд
        function showTeamsSection() {
            teamsSection.style.display = 'block';
            noGameSection.style.display = 'none';
        }

        // Показати секцію "немає гри"
        function showNoGameSection() {
            teamsSection.style.display = 'none';
            questionSection.style.display = 'none';
            waitingSection.style.display = 'none';
            noGameSection.style.display = 'block';
        }

        // Оновити команди та рахунок
        function updateTeams(data) {
            // Оновлення назв команд з анімацією
            if (team1Name.textContent !== data.team1) {
                team1Name.textContent = data.team1;
                team1Card.classList.add('slide-in-left');
                setTimeout(() => team1Card.classList.remove('slide-in-left'), 500);
            }

            if (team2Name.textContent !== data.team2) {
                team2Name.textContent = data.team2;
                team2Card.classList.add('slide-in-right');
                setTimeout(() => team2Card.classList.remove('slide-in-right'), 500);
            }

            // Оновлення рахунку з анімацією
            if (team1Score.textContent !== data.team1_score.toString()) {
                team1Score.textContent = data.team1_score;
                team1Score.classList.add('score-animation');
                setTimeout(() => team1Score.classList.remove('score-animation'), 500);
                playScoreSound();
            }

            if (team2Score.textContent !== data.team2_score.toString()) {
                team2Score.textContent = data.team2_score;
                team2Score.classList.add('score-animation');
                setTimeout(() => team2Score.classList.remove('score-animation'), 500);
                playScoreSound();
            }
        }

        // Показати питання
        function showQuestion(question) {
            questionSection.style.display = 'block';
            waitingSection.style.display = 'none';

            questionNumber.innerHTML = `<i class="fas fa-question-circle"></i> Питання № ${question.number}`;
            questionText.textContent = question.text;

            // Анімація появи питання
            const questionCard = questionSection.querySelector('.question-card');
            questionCard.style.animation = 'none';
            setTimeout(() => {
                questionCard.style.animation = 'fadeInUp 0.6s ease-out';
            }, 10);
        }

        // Показати очікування питання
        function showWaitingForQuestion() {
            questionSection.style.display = 'none';
            waitingSection.style.display = 'block';
        }

        // Звукові ефекти
        function playScoreSound() {
            try {
                // Створення простого звукового сигналу
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = 800;
                oscillator.type = 'sine';

                gainNode.gain.setValueAtTime(0, audioContext.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.2, audioContext.currentTime + 0.01);
                gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.3);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            } catch (error) {
                console.log('Звук недоступний:', error);
            }
        }

        // Ініціалізація при завантаженні сторінки
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Ініціалізація WebSocket з\'єднання...');
            connectWebSocket();
        });

        // Обробка втрати з'єднання з інтернетом
        window.addEventListener('offline', function() {
            updateConnectionStatus('disconnected');
            document.body.style.filter = 'grayscale(100%)';
            document.body.title = 'Відсутнє з\'єднання з інтернетом';
        });

        window.addEventListener('online', function() {
            document.body.style.filter = 'none';
            document.body.title = '';
            if (socket.readyState !== WebSocket.OPEN) {
                attemptReconnect();
            }
        });

        // Підтримка повноекранного режиму
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F11' || (e.key === 'f' && e.ctrlKey)) {
                e.preventDefault();
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.log('Не вдалося увійти в повноекранний режим:', err);
                    });
                } else {
                    document.exitFullscreen();
                }
            }
        });

        // Приховання курсору після бездіяльності
        let mouseTimer;
        document.addEventListener('mousemove', function() {
            document.body.style.cursor = 'default';
            clearTimeout(mouseTimer);
            mouseTimer = setTimeout(() => {
                document.body.style.cursor = 'none';
            }, 3000);
        });

        // Обробка помилок
        window.addEventListener('error', function(e) {
            console.error('Помилка JavaScript:', e.error);
        });

        // Закриття з'єднання при закритті сторінки
        window.addEventListener('beforeunload', function() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.close();
            }
        });

        console.log('Екран глядачів завантажено з WebSocket підтримкою. Версія: 2.0');
    </script>
</body>
</html>
